<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chave PIX - SSVP</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <!--<link rel="stylesheet" href="css/contador.css">-->
    <script src="js/libs/qrcode.min.js"></script>
    <style>
        .pix-container { text-align: center; padding: 20px; }
        
        #qrcode img { margin: 0 auto; }
        .chave-display { 
            font-weight: bold;
            font-size: 1.2rem;
            color: #0064b6;
            margin-bottom: 20px;
            
            /* Solução para textos longos */
            word-wrap: break-word;       /* Força a quebra em navegadores antigos */
            overflow-wrap: break-word;   /* Força a quebra em navegadores modernos */
            word-break: break-all;       /* Garante que quebre em qualquer caractere se necessário */
            
            max-width: 90%;              /* Garante que o texto não encoste nas bordas */
            margin-left: auto;           /* Centraliza o bloco */
            margin-right: auto;          /* Centraliza o bloco */
        }
        
        /* Estilo padrão do container */
        #qrcode {
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        /* Estado em Tela Cheia */
        #qrcode.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Fica acima de tudo */
            padding: 0;
            border-radius: 0;
        }

        /* Garante que a imagem dentro do QR Code cresça no modo tela cheia */
        #qrcode.fullscreen img {
            width: 85vw !important;  /* Ocupa quase toda a largura */
            height: auto !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="assets/icons/favicon.ico" alt="Ícone SSVP" class="header-icon">
            <h2>Chave pix da conferência</h2> 
            
            <a href="index.html" class="home-link" title="Voltar ao Início">
                <svg class="home-icon-svg" viewBox="0 0 24 24" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="white"/>
                </svg>
            </a>
        </div>
        <input type="hidden" id="initial-state" value="1">
    </header>

    <main class="pix-container">
        <div id="config-secao">
            <label for="input-chave">Configure sua Chave PIX:</label>
            <input type="text" id="input-chave" class="input-qty" placeholder="E-mail, CPF ou Celular">
            <button onclick="salvarChave()" class="btn-primary">Gerar QR Code</button>
        </div>

        <div id="display-secao" style="display: none;">
            <p style="font-size: 0.8rem; color: #666;">(Toque na imagem caso queira ampliar)</p>
            <div id="qrcode"></div>
            <div class="chave-display" id="texto-chave"></div>

            <button onclick="baixarQRCode()" class="btn-primary" style="margin-bottom: 15px; background-color: #2c3e50;">
                💾 Baixar Imagem do QR Code
            </button>
            
            <button onclick="enviarPix(1)" class="btn-secondary" style="margin-bottom: 10px;">
                Enviar Texto via WhatsApp
            </button>
            <button onclick="enviarPix(2)" class="btn-secondary">
                Enviar Texto + Link QR Code
            </button>
            <hr>
            <button onclick="editarChave()" style="background: none; border: none; color: #666; text-decoration: underline;">
                Alterar Chave
            </button>
        </div>
    </main>

    <script src="js/pix.js"></script>
    <footer class="footer-fixo">
        <div class="footer-content">
            <span>Conferência Santa Perpétua e Santa Felicidade</span>
            <span class="version-tag">v3.0.0</span>
        </div>
    </footer>
</body>
</html>
