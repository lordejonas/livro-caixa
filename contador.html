<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador SSVP</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/contador.css"> </head>
<body>
    <header>
        <div class="header-content">
            <img src="assets/icons/favicon.ico" alt="Ícone SSVP" class="header-icon">
            <h2>Contar dinheiro</h2> 
            
            <a href="index.html" class="home-link" title="Voltar ao Início">
                <svg class="home-icon-svg" viewBox="0 0 24 24" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="white"/>
                </svg>
            </a>
        </div>
        <input type="hidden" id="initial-state" value="1">
    </header>

    <main id="main-container">
        <div id="lista-dinheiro">
            </div>

        <div class="row-contador row-total-geral">
            <div class="info-texto">
                <span class="label-cedula">TOTAL GERAL</span>
                <span class="valor-linha" id="total-geral" style="font-size: 1.4rem; font-weight: 800;">R$ 0,00</span>
            </div>
            </div>

        <div class="actions" style="padding: 10px 20px;">
            <button onclick="salvarValores()" class="btn-primary" style="width: 100%; margin-bottom: 15px; background-color: #27ae60;">
                💾 Salvar Valores
            </button>
            
            <a href="index.html" class="btn-secondary" style="display: block; text-align: center; text-decoration: none;">
                Voltar ao Menu
            </a>
        </div>
    </main>
    <div id="toast">✅ Valores salvos!</div>
    <script src="js/contador.js"></script> </body>
    <footer class="footer-fixo">
        <div class="footer-content">
            <span>Conferência Santa Perpétua e Santa Felicidade</span>
            <span class="version-tag">v3.0.0</span>
        </div>
    </footer>
</html>
